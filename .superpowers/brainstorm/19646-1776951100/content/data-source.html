<h2>每日运势卡片 - 数据来源</h2>
<p class="subtitle">卡片展示的数据从哪里来？</p>

<div class="options">
  <div class="option" data-choice="existing" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>基于历史报告</h3>
      <p>读取用户最近一次生成的报告数据，动态计算今日运势</p>
    </div>
  </div>
  <div class="option" data-choice="quick" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>快速生成入口</h3>
      <p>用户点击卡片才触发计算，平时显示"点击查看今日运势"</p>
    </div>
  </div>
  <div class="option" data-choice="basic" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>只基于基本信息</h3>
      <p>无需完整报告，只要有姓名+出生日期即可生成简单运势</p>
    </div>
  </div>
</div>
