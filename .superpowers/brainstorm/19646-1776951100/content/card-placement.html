<h2>卡片位置选择</h2>
<p class="subtitle">每日运势卡片放在首页哪里？</p>

<div class="options">
  <div class="option" data-choice="top" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>顶部 - Hero位置</h3>
      <p>Birth Form 上方，最显眼，进来就看到</p>
    </div>
  </div>
  <div class="option" data-choice="bottom" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>底部 - Form 下方</h3>
      <p>先看到算命表单，卡片作为辅助信息</p>
    </div>
  </div>
  <div class="option" data-choice="replace" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>替代"今日运势"按钮</h3>
      <p>保持现有交互逻辑，只是改成卡片展示</p>
    </div>
  </div>
</div>

<div class="mockup" style="margin-top: 32px">
  <div class="mockup-header">A 顶部位置 预览</div>
  <div class="mockup-body" style="background: #0a0e27; padding: 16px; border-radius: 8px;">
    <div style="border: 1px dashed #f0c674; border-radius: 12px; padding: 16px; margin-bottom: 16px; background: rgba(240,198,116,0.1);">
      <div style="color: #f0c674; font-size: 12px;">📅 每日运势卡片（选中B方案）</div>
    </div>
    <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px;">
      <div style="color: #888; font-size: 13px;">📝 算命表单</div>
    </div>
  </div>
</div>

<div class="mockup" style="margin-top: 16px">
  <div class="mockup-header">B 底部位置 预览</div>
  <div class="mockup-body" style="background: #0a0e27; padding: 16px; border-radius: 8px;">
    <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; margin-bottom: 16px;">
      <div style="color: #888; font-size: 13px;">📝 算命表单</div>
    </div>
    <div style="border: 1px dashed #f0c674; border-radius: 12px; padding: 16px; background: rgba(240,198,116,0.1);">
      <div style="color: #f0c674; font-size: 12px;">📅 每日运势卡片（选中B方案）</div>
    </div>
  </div>
</div>
