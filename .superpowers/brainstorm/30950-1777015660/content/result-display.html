<h2>PK结果展示方式</h2>
<p class="subtitle">对比结果出来后，如何展示谁更旺？</p>

<div class="options">
  <div class="option" data-choice="radar-overlay" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>雷达图叠加</h3>
      <p>双方雷达图重叠显示，蓝色是你，红色是对方，交叉看各维度优劣</p>
    </div>
  </div>

  <div class="option" data-choice="vs-split" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>VS对战卡片</h3>
      <p>左右分栏对比，左边是你右边是对方，中间大"V"字，各维度分行对比</p>
    </div>
  </div>

  <div class="option" data-choice="winner-summary" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>胜负总结 + 雷达图</h3>
      <p>顶部显示"你的事业运碾压对方！"类似金句总结，底部两个雷达图并排</p>
    </div>
  </div>
</div>
