<h2>运势PK分享的流程设计</h2>
<p class="subtitle">点击选择你喜欢的PK流程方式</p>

<div class="options">
  <div class="option" data-choice="link" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>链接邀请PK</h3>
      <p>分享带挑战链接的图片 → 好友点击链接 → 填写生日参与PK → 双方结果对比</p>
      <ul style="margin-top:8px;font-size:13px;color:#888">
        <li>✓ 分享图片美观</li>
        <li>✓ 好友无需登录即可PK</li>
        <li>✓ 可生成PK海报分享到朋友圈</li>
      </ul>
    </div>
  </div>

  <div class="option" data-choice="image" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>纯图片分享</h3>
      <p>直接生成分数对比图片分享 → 对方截图上传 → 系统识别分数对比</p>
      <ul style="margin-top:8px;font-size:13px;color:#888">
        <li>✓ 实现简单</li>
        <li>✓ 适合朋友圈分享</li>
        <li>✗ 需要截图上传识别</li>
      </ul>
    </div>
  </div>

  <div class="option" data-choice="friend" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>好友对战模式</h3>
      <p>分享给特定好友 → 好友注册/登录 → 双向PK记录永久保存</p>
      <ul style="margin-top:8px;font-size:13px;color:#888">
        <li>✓ 可持续对战</li>
        <li>✓ 有对战记录排行榜</li>
        <li>✗ 需要用户体系支持</li>
      </ul>
    </div>
  </div>
</div>
