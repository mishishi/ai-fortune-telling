<h2>加载仪式感设计</h2>
<p class="subtitle">命盘生成时的"命运揭晓"体验</p>

<div class="mockup">
  <div class="mockup-header">预览：命盘生成中</div>
  <div class="mockup-body">
    <div style="text-align:center;padding:40px 20px;background:linear-gradient(180deg,#0a0e27 0%,#1a1f3a 100%);border-radius:12px;">
      <!-- Animated BaZi Ring -->
      <div style="width:120px;height:120px;margin:0 auto 30px;position:relative;">
        <div style="position:absolute;inset:0;border:3px solid rgba(255,255,255,0.1);border-radius:50%;animation:spin 3s linear infinite;"></div>
        <div style="position:absolute;inset:4px;border:3px solid rgba(255,255,255,0.05);border-radius:50%;animation:spin 2s linear infinite reverse;"></div>
        <div style="position:absolute;inset:12px;background:linear-gradient(135deg,#1a1f3a,#0a0e27);border-radius:50%;display:flex;align-items:center;justify-content:center;">
          <span style="font-size:28px;animation:pulse 1.5s ease-in-out infinite;">☯</span>
        </div>
        <!-- Glow effect -->
        <div style="position:absolute;inset:-10px;background:radial-gradient(circle,rgba(123,104,238,0.3) 0%,transparent 70%);animation:pulse 2s ease-in-out infinite;"></div>
      </div>

      <!-- Step indicators -->
      <div style="display:flex;justify-content:center;gap:8px;margin-bottom:20px;">
        <div style="width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#f0c674;box-shadow:0 0 8px #f0c674;animation:pulse 1s ease-in-out infinite;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2);"></div>
      </div>

      <!-- Text -->
      <p style="color:#f0c674;font-size:18px;margin-bottom:8px;font-weight:600;">AI 命理师解读中...</p>
      <p style="color:rgba(255,255,255,0.5);font-size:13px;">五行流转，命盘正在生成</p>

      <!-- Progress bar -->
      <div style="width:200px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin:20px auto 0;overflow:hidden;">
        <div style="width:60%;height:100%;background:linear-gradient(90deg,#7b68ee,#f0c674);border-radius:2px;animation:shimmer 2s ease-in-out infinite;"></div>
      </div>
    </div>
  </div>
</div>

<div class="section" style="margin-top:24px;">
  <h3>改进要点</h3>
  <ul style="color:rgba(255,255,255,0.7);font-size:14px;line-height:1.8;padding-left:20px;">
    <li><strong style="color:#f0c674;">命运揭晓动画</strong> — 环形旋转 + 中心脉动，象征五行运转</li>
    <li><strong style="color:#f0c674;">色彩引导</strong> — 步骤用五行颜色渐变表示进程</li>
    <li><strong style="color:#f0c674;">氛围文字</strong> — "五行流转"而非"加载中"，增强代入感</li>
    <li><strong style="color:#f0c674;">光晕效果</strong> — 微妙的呼吸光晕，增加神秘感</li>
  </ul>
</div>

<style>
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.7; transform:scale(0.95); } }
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
</style>
