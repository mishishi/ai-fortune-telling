<h2>选择视觉风格方向</h2>
<p class="subtitle">这是命理应用的核心视觉语言，决定整体体验调性</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>东方神秘 · 典雅金黑</h3>
      <p>深黑底色 + 金色(#f0c674)点缀 + 中国传统纹样元素，典雅大气，仪式感强</p>
      <div style="display:flex;gap:8px;margin-top:12px">
        <div style="width:40px;height:40px;background:#0a0e27;border-radius:8px;border:2px solid #f0c674"></div>
        <div style="width:40px;height:40px;background:#f0c674;border-radius:8px"></div>
        <div style="width:40px;height:40px;background:linear-gradient(135deg,#2a1f1a,#1a1510);border-radius:8px"></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>紫金宇宙 · 科幻命理</h3>
      <p>现有紫色渐变 + 星空粒子效果，融合命理与现代科技感，时尚年轻</p>
      <div style="display:flex;gap:8px;margin-top:12px">
        <div style="width:40px;height:40px;background:linear-gradient(135deg,#7b68ee,#4169e1);border-radius:8px"></div>
        <div style="width:40px;height:40px;background:#0a0e27;border-radius:8px;border:2px solid #7b68ee"></div>
        <div style="width:40px;height:40px;background:radial-gradient(circle at 30% 30%,#1a1a3a,#0a0e27);border-radius:8px"></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>水墨山水 · 意境东方</h3>
      <p>低饱和墨色系 + 淡雅渐变 + 水墨晕染效果，留白意境，文人雅致</p>
      <div style="display:flex;gap:8px;margin-top:12px">
        <div style="width:40px;height:40px;background:linear-gradient(135deg,#2d2d2d,#1a1a1a);border-radius:8px"></div>
        <div style="width:40px;height:40px;background:#e8e0d5;border-radius:8px"></div>
        <div style="width:40px;height:40px;background:radial-gradient(ellipse at 50% 50%,#f5f0e8 0%,#d4c8b8 100%);border-radius:8px"></div>
      </div>
    </div>
  </div>
</div>
