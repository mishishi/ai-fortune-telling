<h2>五行中国传统色</h2>
<p class="subtitle">用东方五正色替代西方配色，更契合命理主题</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>推荐：青赤黄白黑</h3>
      <p>传统五正色，木青、火赤、土黄、金白、水黑</p>
      <div style="display:flex;gap:6px;margin-top:12px;">
        <div style="flex:1;height:36px;background:#4ade80;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#1a1a1a;font-weight:600;">木青</div>
        <div style="flex:1;height:36px;background:#ef4444;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:600;">火赤</div>
        <div style="flex:1;height:36px;background:#eab308;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#1a1a1a;font-weight:600;">土黄</div>
        <div style="flex:1;height:36px;background:#e5e5e5;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#1a1a1a;font-weight:600;">金白</div>
        <div style="flex:1;height:36px;background:#1e293b;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:600;">水黑</div>
      </div>
      <div style="margin-top:12px;padding:10px;background:rgba(255,255,255,0.05);border-radius:8px;font-size:12px;color:rgba(255,255,255,0.6);">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>木</span><span style="color:#4ade80;">#4ade80</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>火</span><span style="color:#ef4444;">#ef4444</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>土</span><span style="color:#eab308;">#eab308</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>金</span><span style="color:#e5e5e5;">#e5e5e5</span></div>
        <div style="display:flex;justify-content:space-between;"><span>水</span><span style="color:#94a3b8;">#1e293b</span></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>敦煌色谱</h3>
      <p>敦煌壁画配色，矿物颜料感，浓烈厚重</p>
      <div style="display:flex;gap:6px;margin-top:12px;">
        <div style="flex:1;height:36px;background:#2d5a3d;border-radius:6px;"></div>
        <div style="flex:1;height:36px;background:#8b3a3a;border-radius:6px;"></div>
        <div style="flex:1;height:36px;background:#c4a35a;border-radius:6px;"></div>
        <div style="flex:1;height:36px;background:#d4c8b0;border-radius:6px;"></div>
        <div style="flex:1;height:36px;background:#2a2a35;border-radius:6px;"></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>故宫色谱</h3>
      <p>故宫宫墙配色，庄重典雅，皇家气派</p>
      <div style="display:flex;gap:6px;margin-top:12px;">
        <div style="flex:1;height:36px;background:#3d7a4a;border-radius:6px;"></div>
        <div style="flex:1;height:36px;background:#a63d3d;border-radius:6px;"></div>
        <div style="flex:1;height:36px;background:#d4a84b;border-radius:6px;"></div>
        <div style="flex:1;height:36px;background:#f5f0e6;border-radius:6px;"></div>
        <div style="flex:1;height:36px;background:#1a1a1a;border-radius:6px;"></div>
      </div>
    </div>
  </div>
</div>
